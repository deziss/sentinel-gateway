{{- if .Values.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sentinel-gateway.fullname" . }}
  labels:
    {{- include "sentinel-gateway.labels" . | nindent 4 }}
rules:
  # Read own ConfigMap and Secrets (for config reloads)
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "watch"]
    resourceNames:
      - {{ include "sentinel-gateway.fullname" . }}-config
      - {{ include "sentinel-gateway.fullname" . }}-secrets
  # Read own pods for health awareness
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
{{- end }}
