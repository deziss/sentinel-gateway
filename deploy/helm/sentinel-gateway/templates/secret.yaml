{{- if not .Values.externalSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sentinel-gateway.fullname" . }}-secrets
  labels:
    {{- include "sentinel-gateway.labels" . | nindent 4 }}
type: Opaque
data:
  database-url: {{ .Values.secrets.databaseUrl | b64enc | quote }}
  jwt-private-key: {{ .Values.secrets.jwtPrivateKey | b64enc | quote }}
  jwt-public-key: {{ .Values.secrets.jwtPublicKey | b64enc | quote }}
  encryption-key: {{ .Values.secrets.encryptionKey | b64enc | quote }}
  {{- if .Values.secrets.licenseKey }}
  license-key: {{ .Values.secrets.licenseKey | b64enc | quote }}
  {{- end }}
{{- end }}
