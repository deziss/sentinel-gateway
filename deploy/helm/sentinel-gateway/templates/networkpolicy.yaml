{{- if .Values.networkPolicy.enabled }}
# ── Backend Network Policy ───────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sentinel-gateway.fullname" . }}
  labels:
    {{- include "sentinel-gateway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sentinel-gateway.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from ingress controller
    {{- with .Values.networkPolicy.ingress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    # Allow from frontend pods
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: frontend
      ports:
        - port: 8080
          protocol: TCP
    # Allow Prometheus scraping
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: 8080
          protocol: TCP
  egress:
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # PostgreSQL
    - ports:
        - port: 5432
          protocol: TCP
    # Redis
    - ports:
        - port: 6379
          protocol: TCP
    # HTTPS (upstream LLM providers)
    - ports:
        - port: 443
          protocol: TCP
    # OpenTelemetry Collector (gRPC + HTTP)
    - ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
---
# ── Frontend Network Policy ──────────────────────────────────────────────────
{{- if .Values.frontend.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sentinel-gateway.fullname" . }}-frontend
  labels:
    {{- include "sentinel-gateway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sentinel-gateway.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - port: 80
          protocol: TCP
  egress:
    # DNS
    - ports:
        - port: 53
          protocol: UDP
    # Backend API
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backend
      ports:
        - port: 8080
          protocol: TCP
{{- end }}
{{- end }}
