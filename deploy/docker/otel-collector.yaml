# =============================================================================
# OpenTelemetry Collector Configuration
# Standard OTel setup: receives traces/metrics/logs, exports to stdout + prometheus
# =============================================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s

  memory_limiter:
    check_interval: 1s
    limit_mib: 400
    spike_limit_mib: 100

exporters:
  # Debug: logs telemetry to stdout (useful for dev)
  debug:
    verbosity: basic

  # Prometheus exporter: exposes metrics on :8889/metrics
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: sentinel_gateway

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
